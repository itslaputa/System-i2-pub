name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update, for example v1"
        required: true
        default: "v1"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            args: ""
          - name: Windows
            os: windows-latest
            args: ""
          - name: Linux
            os: ubuntu-22.04
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload Tauri bundle
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.release_tag || github.ref_name }}
          releaseName: "System-I2 ${{ github.event.inputs.release_tag || github.ref_name }}"
          releaseBody: |
            Unsigned desktop builds for System-I2.

            Platform signing and notarization are not configured in this public workflow.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          assetNamePattern: "[name]-[version]-[platform]-[arch][ext]"
